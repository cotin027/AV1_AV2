    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pré cadastro | Portal Geek</title>

        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    </head>

    <!-- 🔥 CORREÇÃO IMPORTANTE -->
    <body>

    <header class="header-sistema">
        <div class="header-container">
            <h2><i class="fa-solid fa-gamepad"></i> Portal Geek</h2>

            <nav class="nav-menu">
                <a href="index.html">Início</a>
                <a href="atracoes.html">Atrações</a>
                <a href="cronograma.html">Cronograma</a>
                <a href="cadastro.html" class="active">Pré-Cadastro</a>
            </nav>

            <button id="btn-tema" onclick="alternarTema()" class="btn-tema">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="container">

        <h1>Pré-Cadastro</h1>
        <p>Inscreva-se para ficar por dentro das novidades do evento.</p>

        <!-- ================= FORMULÁRIO ================= -->
        <form id="formulario" onsubmit="validarFormulario(event)">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" class="form-control" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" class="form-control" required>

            <label for="cidade">Cidade:</label>
            <input type="text" id="cidade" class="form-control" required>

            <label for="faixa-etaria">Faixa Etária:</label>
            <select id="faixa-etaria" class="form-control" required>
                <option value="">Selecione...</option>
                <option>Até 12 anos</option>
                <option>13 a 17 anos</option>
                <option>18 a 25 anos</option>
                <option>26 a 40 anos</option>
                <option>40+ anos</option>
            </select>

            <label for="evento">Evento de Interesse:</label>
            <select id="evento" class="form-control" required>
                <option value="">Selecione um evento...</option>
                <option>Campinas Anime Geek (05/02)</option>
                <option>Festival Cultura Geek (17/09)</option>
                <option>GeekExpo (14 e 15 de Maio)</option>
                <option>City Arena Geek (19/07)</option>
                <option>Contagem Geek (Parque Fernão Dias)</option>
                <option>Festival Cultura Nerd (31 de Maio)</option>
            </select>

            <button type="submit" class="btn" style="width: 100%;">
                Cadastrar
            </button>

            <p id="mensagem"></p>

        </form>

    

    </main>

    <footer class="footer-sistema">
        <p>Portal Geek © 2026 | Desenvolvido para Avaliação SENAI</p>

        <div class="redes-sociais">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-discord"></i></a>
            <a href="#"><i class="fa-brands fa-youtube"></i></a>
        </div>
    </footer>

    <script src="Server/server.js"></script>

    </body>
    </html>
